<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="price-card.css">
  <link rel="stylesheet" href="../price/price.css">
  <link rel="stylesheet" href="../buttons/buttons.css">
  <title>pricing-card</title>
</head>
<body>

<div class="pricing-card">
  <div class="pricing-card__wrapper-img">
    <i class="fas fa-tablet-alt"></i>
  </div>
  <div class="pricing-card__wrapper-text">
    <h3 class="pricing-card__title">Basic</h3>
    <p class="pricing-card__desc">
      Lorem ipsum dolor sit amet,
      consectetur adipiscing elit
    </p>
  </div>
  <div class="pricing-card__wrapper-price price">
      <span class="price__value">free</span>
      <div class="price__line"></div>
      <span class="price__period">free forever</span>
      <button class="button__price button">get free now</button>
  </div>
</div>

<div class="pricing-card">
  <div class="pricing-card__wrapper-img pricing-card__wrapper-img--reverse">
    <i class="fas fa-laptop"></i>
  </div>
  <div class="pricing-card__wrapper-text">
    <h3 class="pricing-card__title">Standard</h3>
    <p class="pricing-card__desc">
      Lorem ipsum dolor sit amet,
      consectetur adipiscing elit
    </p>
  </div>
  <div class="pricing-card__wrapper-price price">
    <span class="price__value">$99</span>
    <div class="price__line"></div>
    <span class="price__period">month</span>
    <button class="button__price button">upgrade</button>
  </div>
</div>

<div class="pricing-card">
  <div class="pricing-card__wrapper-img">
    <i class="fas fa-desktop"></i>
  </div>
  <div class="pricing-card__wrapper-text">
    <h3 class="pricing-card__title">Enterprise</h3>
    <p class="pricing-card__desc">
      Lorem ipsum dolor sit amet,
      consectetur adipiscing elit
    </p>
  </div>
  <div class="pricing-card__wrapper-price price">
    <span class="price__value">$199</span>
    <div class="price__line"></div>
    <span class="price__period">free forever</span>
    <button class="button__price button">get free now</button>
  </div>
</div>

</body>
</html>
