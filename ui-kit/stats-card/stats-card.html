<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./stats-card.css">
  <title>stats-card</title>
</head>
<body>

<div class="stats-card">
  <div class="stats-card__wrapper-img">
    <i class="fas fa-puzzle-piece"></i>
  </div>
  <div class="stats-card__wrapper-text">
    <p class="stats-card__value">20</p>
    <p class="stats-card__key">Products</p>
  </div>
</div>

<div class="stats-card">
  <div class="stats-card__wrapper-img">
    <i class="fas fa-cloud-download-alt"></i>
  </div>
  <div class="stats-card__wrapper-text">
    <p class="stats-card__value">120,000</p>
    <p class="stats-card__key">Downloads</p>
  </div>
</div>

<div class="stats-card">
  <div class="stats-card__wrapper-img">
    <i class="fas fa-users"></i>
  </div>
  <div class="stats-card__wrapper-text">
    <p class="stats-card__value">1200</p>
    <p class="stats-card__key">Customers</p>
  </div>
</div>

<div class="stats-card">
  <div class="stats-card__wrapper-img">
    <i class="fas fa-thumbs-up"></i>
  </div>
  <div class="stats-card__wrapper-text">
    <p class="stats-card__value">900</p>
    <p class="stats-card__key">Like</p>
  </div>
</div>


</body>
</html>
