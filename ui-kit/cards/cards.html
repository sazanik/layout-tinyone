<!------------features-cards--------------->
<div class="features-card card card--vertical">
  <div class="features-card__wrapper-img card__wrapper-img">

  </div>

  <div class="features-card__wrapper-text card__wrapper-text">
    <h3 class="features-card__title">Title</h3>
    <p class="features-card__desc">Description</p>
  </div>
</div>

<!------------------------------------------------->

  <div class="pricing-card__wrapper-img card__wrapper-img">
    <i class="pricing-card__img fas fa-tablet-alt"></i>
  </div>

  <div class="pricing-card__wrapper-text card__wrapper-text">
    <h3 class="pricing-card__title">Title</h3>
    <p class="pricing-card__desc">Description</p>
  </div>

  <div class="pricing-card__price price card__another-info">
    <!--social links or pricing info-->
  </div>
</div>
