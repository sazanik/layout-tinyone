<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>page-header</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="page-header.css">
</head>
<body>

<header class="page__header page-header">
  <a href="#" class="page-header__menu">
    <i class="fas fa-bars"></i>
  </a>
  <a href="#" class="page-header__logo-link">
    <img class="page-header__logo-img" src="../../images/logo.png" alt="logo">
  </a>
  <ul class="page-header__social">
    <li class="page-header__item">
      <a href="#" class="page-header__link">
        <i class="fab fa-facebook-f"></i>
      </a></li>
    <li class="page-header__item">
      <a href="#" class="page-header__link">
        <i class="fab fa-twitter"></i>
      </a></li>
    <li class="page-header__item">
      <a href="#" class="page-header__link">
        <i class="fab fa-google-plus-g"></i>
      </a></li>
    <li class="page-header__item">
      <a href="#" class="page-header__link">
        <i class="fab fa-pinterest"></i>
      </a></li>
  </ul>
</header>

</body>
</html>
