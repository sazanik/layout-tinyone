<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./contact-card.css">
  <title>contact card</title>
</head>
<body>

<div class="contact-card">
  <div class="contact-card__wrapper-img">
    <i class="fas fa-map-marker-alt"></i>
  </div>
  <div class="contact-card__wrapper-text">
    <p class="contact-card__key">Address</p>
    <p class="contact-card__value">66, Dang Van ngu, Dong Da, Ha noi, Vietnam</p>
  </div>
</div>

<div class="contact-card">
  <div class="contact-card__wrapper-img">
    <i class="fas fa-envelope"></i>
  </div>
  <div class="contact-card__wrapper-text">
    <p class="contact-card__key">E-mail</p>
    <p class="contact-card__value">contact@halovietnam.com</p>
  </div>
</div>

<div class="contact-card">
  <div class="contact-card__wrapper-img">
    <i class="fas fa-phone-square-alt"></i>
  </div>
  <div class="contact-card__wrapper-text">
    <p class="contact-card__key">Phone</p>
    <p class="contact-card__value">+844 1234 56789</p>
  </div>
</div>

</body>
</html>
